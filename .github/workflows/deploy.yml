name: Deploy to AWS S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET_NAME: s3-my-digital-hub-hieuvtm-27-11-25  
  CLOUDFRONT_DISTRIBUTION_ID: E3L4809EDE89DE

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the ENTIRE repository (includes src/, public/, package.json, etc.)
      # This is where all your source code comes from!
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 2: Install dependencies (from package.json)
      - name: Install dependencies
        run: npm ci

      # Step 3: Build the project
      # This runs "vite build" which:
      # - Reads source code from src/
      # - Copies static files from public/ to dist/
      # - Bundles everything into dist/ folder (the final website)
      - name: Build project
        run: npm run build
      
      - name: Verify build output
        run: |
          echo "📋 Verifying build output..."
          echo ""
          echo "Files in dist/ directory:"
          find dist -type f -o -type d | sort
          echo ""
          echo "Checking for required files:"
          [ -f "dist/index.html" ] && echo "✅ index.html found" || echo "❌ index.html missing!"
          [ -d "dist/assets" ] && echo "✅ assets/ directory found" || echo "❌ assets/ directory MISSING!"
          
          echo ""
          echo "Assets in dist/assets/:"
          if [ -d "dist/assets" ]; then
            ls -lah dist/assets/ | head -20
            echo ""
            echo "Asset file count: $(find dist/assets -type f | wc -l)"
          else
            echo "❌ ERROR: assets/ directory not found! Build may have failed."
            exit 1
          fi
          
          echo ""
          echo "Checking index.html references:"
          if [ -f "dist/index.html" ]; then
            echo "Asset references in index.html:"
            grep -o '/assets/[^"]*' dist/index.html || echo "⚠️  No asset references found in index.html"
          fi
          
          echo ""
          echo "Public files (should be in dist/ root):"
          ls -1 dist/*.ico dist/*.pdf dist/*.svg dist/*.txt 2>/dev/null || echo "⚠️  Some public files may be missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4: Deploy the built website (dist/ folder) to S3
      # Note: Only dist/ folder is uploaded, NOT src/ or public/
      # (Those were used during build, but dist/ is the final result)
      - name: Deploy to S3
        run: |
          # List what will be deployed
          echo "📦 Files to deploy from dist/ (built from src/ and public/):"
          echo "Directory structure:"
          tree dist/ -L 3 || find dist -type f | head -20
          echo ""
          
          # Sync all files from dist/ to S3 bucket root
          # --delete removes files in S3 that don't exist in dist/
          # --exact-timestamps ensures files are updated if changed
          # Important: This syncs EVERYTHING including assets/ folder
          echo "🔄 Syncing all files to S3..."
          aws s3 sync dist/ s3://${{ env.S3_BUCKET_NAME }}/ \
            --delete \
            --exact-timestamps \
          
          # Set no-cache for index.html (important for React Router)
          echo "📝 Setting cache headers for index.html..."
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --metadata-directive REPLACE \
          
          # Set cache headers for assets (long cache for immutable assets)
          if [ -d "dist/assets" ]; then
            echo "📝 Setting cache headers for assets..."
            aws s3 sync dist/assets/ s3://${{ env.S3_BUCKET_NAME }}/assets/ \
              --cache-control "public, max-age=31536000, immutable" \
              --exact-timestamps \
          fi
          
          # Verify deployment
          echo ""
          echo "✅ Deployment complete! Verifying files in S3:"
          echo ""
          echo "All files in S3:"
          aws s3 ls s3://${{ env.S3_BUCKET_NAME }}/ --recursive --human-readable --summarize
          echo ""
          echo "Assets in S3:"
          aws s3 ls s3://${{ env.S3_BUCKET_NAME }}/assets/ --recursive --human-readable || echo "⚠️  No assets found"

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

