name: Deploy to AWS S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET_NAME: s3-my-digital-hub-hieuvtm-27-11-25  
  CLOUDFRONT_DISTRIBUTION_ID: E3L4809EDE89DE

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
      
      - name: Verify build output
        run: |
          echo "📋 Verifying build output..."
          echo ""
          echo "Files in dist/ directory:"
          find dist -type f -o -type d | sort
          echo ""
          echo "Checking for required files:"
          [ -f "dist/index.html" ] && echo "✅ index.html found" || echo "❌ index.html missing!"
          [ -d "dist/assets" ] && echo "✅ assets/ directory found" || echo "⚠️  assets/ directory not found"
          ls -la dist/assets/ 2>/dev/null | head -10 || echo "⚠️  No assets found"
          echo ""
          echo "Public files (should be in dist/ root):"
          ls -1 dist/*.ico dist/*.pdf dist/*.svg dist/*.txt 2>/dev/null || echo "⚠️  Some public files may be missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # List what will be deployed
          echo "📦 Files to deploy from dist/:"
          ls -la dist/ || true
          echo ""
          
          # Sync all files from dist/ to S3 bucket root
          # --delete removes files in S3 that don't exist in dist/
          # --exact-timestamps ensures files are updated if changed
          aws s3 sync dist/ s3://${{ env.S3_BUCKET_NAME }}/ --delete --exact-timestamps
          
          # Set no-cache for index.html (important for React Router)
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --metadata-directive REPLACE
          
          # Verify deployment
          echo ""
          echo "✅ Deployment complete! Files in S3:"
          aws s3 ls s3://${{ env.S3_BUCKET_NAME }}/ --recursive --human-readable --summarize

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

